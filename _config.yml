# ==========================================
# DemosAI-Foundation Site Configuration
# ==========================================

# Import the theme
theme: jekyll-theme-chirpy

# Language and Timezone
lang: en
timezone: UTC # Or set to your local timezone, e.g., Europe/Stockholm

# Jekyll-seo-tag settings
# ↓ --------------------------

title: DemosAI
tagline: AI for the people
description: >-
  DemosAI is a Foundation created for promoting true open sourcing of knowledge 
  for the people, specifically around artificial intelligence.
  DemosAIs work is open source and we plan to release full steps on working 
  towards artificial general intelligence.

# Protocol & hostname for your site
url: "https://demosai.org"
baseurl: ""

github:
  username: DemosAI-Foundation

social:
  name: DemosAI Foundation
  email: bbonn@outlook.com
  links:
    - https://github.com/DemosAI-Foundation
    # - https://twitter.com/username 

# Webmaster Verifications (Google, Bing, etc.)
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------

# Web Analytics Settings
analytics:
  google:
    id: 
  umami:
    id: 
    domain: 

# Page views settings
pageviews:
  provider: # supports 'goatcounter'

# Theme Mode: Keep empty to allow toggle, or set 'light' or 'dark'
theme_mode: 

# Avatar on sidebar (local path or URL)
avatar: /assets/img/favicons/ascii-art-125.png

# Social preview image for SEO (og:image)
social_preview_image: 

# Table of Contents global switch
toc: true

# Comment System Configuration
comments:
  # Active provider (Changed from empty to giscus)
  provider: giscus

  # Giscus settings (Powered by GitHub Discussions)
  giscus:
    repo: 'DemosAI-Foundation/Blog'
    repo_id: 'R_kgDORbwCWA'     # Example: R_kgD...
    category: 'General'                 # Ensure Discussions are enabled on GitHub
    category_id: 'DIC_kwDORbwCWM4C3dz5'  # Example: DIC_...
    mapping: 'pathname'
    strict: '0'
    input_position: 'bottom'
    lang: 'en'
    reactions_enabled: '1'

# PWA (Progressive Web App) Settings
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10
baseurl: ""

# ------------ Technical Settings (Not recommended to modify) ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" 
      type: posts
    values:
      layout: post
      comments: true # Globally enable comments for all posts
      toc: true 
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/