name: Convert Approved Discussion to Blog Post

on:
  discussion:
    types: [category_changed]

jobs:
  create-post:
    if: github.event.discussion.category.name == 'Approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      discussions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install PyGithub python-slugify

      - name: Parse discussion and create post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_NUMBER: ${{ github.event.discussion.number }}
          DISCUSSION_BODY: ${{ github.event.discussion.body }}
          DISCUSSION_TITLE: ${{ github.event.discussion.title }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/discussion_to_post.py

      - name: Comment on discussion
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.teams.createDiscussionCommentInOrg
            // Use GraphQL to comment since discussions API differs
            await github.graphql(`
              mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  comment { id }
                }
              }
            `, {
              discussionId: context.payload.discussion.node_id,
              body: "✅ Your post has been approved! A pull request has been created and will be published once reviewed. Thank you!"
            })