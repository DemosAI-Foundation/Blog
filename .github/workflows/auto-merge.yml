name: Auto-Approve and Merge Guest Posts

on:
  pull_request:
    types: [opened, reopened]
    paths:
      - '_posts/**' # Only trigger if the change is in the _posts folder

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    
    # Optional: Only auto-merge if the PR is from a specific label or has a specific title
    if: contains(github.event.pull_request.title, 'guest-post')

    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        uses: pascalgn/automerge-action@v0.16.2
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: "merge"
          MERGE_LABELS: "" # Leave empty to merge all matching PRs